version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: codeflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: codeflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codeflow_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: codeflow_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/codeflow
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=codeflow_super_secret_key_prod_only
      - DEFAULT_AI_PROVIDER=mock
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build: ./backend
    container_name: codeflow_celery
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/codeflow
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=codeflow_super_secret_key_prod_only
      - DEFAULT_AI_PROVIDER=mock
    depends_on:
      - redis
      - db

volumes:
  pgdata:
